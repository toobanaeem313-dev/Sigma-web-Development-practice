<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Filters</title>
    <style>
        img{
            filter: blur(8px);
        }
        .img1{
            filter: brightness(122%) contrast(1) grayscale(100%) sepia(12%) invert(1) opacity(1) ;
        }
    </style>

</head>
<body>
    <div class="container">
        <img src="Untitled.jpg" alt="" width="350px" height="350px">
        <img class="img1" src="pic.jpg" alt="" width="250px" height="250px">
    </div>
</body>
</html>
