<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
</head>
<body>
    <link rel="stylesheet" href="tooba.css">
    <h3>This is CSS tutorial</h3>
    <!-- Inline css -->
    <p style="color:black; font-size: medium; background-color:gray;">This is a paragraph</p>
    <!-- Internal css -->
     <p>This is internal css</p>
     <style>
        p{
            color:purple;
            font-size: larger ;
            background-color: azure!important;

        }
     </style>
     <p>This is external css</p>
</body>
</html>
