<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        h2{
            color: indigo;
        }
    </style>
    <h2>Admission Form</h2>
    <style></style>
    <style>
        input{
            color: blue;
        }
    </style>

    
    <label for="Name">Name</label>
    <input type="text" name="myName" id="Name">
    <br>
    <br>
    <label for="Father Name">Father Name</label>
    <input type="text" name="name" id="Father Name">
    <br>
    <br>
    <label for="CNIC Number">CNIC Number</label>
    <input type="Number" name="number" id="CNIC Number">
    <br>
    <br>
    <label for="Email">Email</label>
    <input type="text" name="my email" id="Email">
    <br>
    <br>
    <label for="Date of Birth">Date of Birth</label>
    <input type="date" name="my dob" id="Date of Birth">
    <br>
    <br> 
    Choose Gender:
    <label for="Male">Male</label>
     <input type="Radio" name="my gender" id="Male">
    <label for="Female">Female</label>
    <input type="radio" name="my gender" id="Female">
    <label for="other">other</label>
    <input type="radio" name="my gender" id="other">
    <br>
    <br>
    <label for="Address">Address</label>
    <input type="text" name="my address" id="Address">
    <br>
    <br>
    <label for="Religion">Religion</label>
    <input type="text" name="my religion" id="Religion">
    <br>
    <br>
    <label for="SSC Marks">SSC Marks</label>
    <input type="Number" name="my ssc marks" id="SSC Marks">
    <br>
    <br>
    <label for="HSSC Marks">HSSC Marks</label>
    <input type="number" name="my hssc marks" id="HSSC Marks">
    <br>
    <br>
    Write Department Names: 
    <br>
    <label for="Departments">Departments</label>
    <input type="text" name="my departments" id="Departments">
    <br>
    <div>
        <input type="Reset" values="Reset Now">
    </div>
    <br>
    <div>
        <input type="Submit" values="Submit Now">
    </div>

</body>
</html>
