<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow & outlines</title>
</head>
<style>
    .box{
        border: 2px solid black;
        padding: 34px;
        box-shadow: 10px 15px 17px 10px rgb(9, 134, 113);
    
    }
    .text-element{
        text-shadow: 2px 2px 4px maroon;
        outline: 2px solid black ;
        outline-offset: 5px;
        border: 2px solid yellow;
        border-radius: 34px;
        outline-color:blue;
        box-shadow: 12px 15px 18px 10px hotpink;

            }
</style>
<body>
    <div class="box">
        I am a box
    </div> <br>
    <br><br>
    <br>
    <br>
    <p class="text-element">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Dolor error pariatur molestiae corporis accusamus ab officiis quidem, porro adipisci ad obcaecati beatae deleniti.</p>
</body>
</html>
