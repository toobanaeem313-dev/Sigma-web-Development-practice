<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h3>Registration Form</h3>
    <form action="">
    <label for="firstname">First Name</label>
    <input type="text" name="name" id="firstname">
    <br>
      <label for="lastname">Last Name</label>
    <input type="text" name="name" id="lastname">
    <br>
    <label for="email">Email</label>
    <input type="email" name="email" id="email">
    <br>
    <label for="password">Password</label>
    <input type="password" name="password" id="password">
    <br>
    <label for="Gender">Gender:</label>
<br>
    <label for="male">Male</label>
    <input type="radio" name="gender" id="male">
    
     <label for="female">Female</label>
    <input type="radio" name="gender" id="female">
    
     <label for="other">Other</label>
    <input type="radio" name="gender" id="other">
    <br>
    <label for="age">Age</label>
    <input type="number" name="age" id="age">
    <br>
    <label for="your Favourite cars collection">select your fav cars collection</label>
    <select name="options" id="myoptions">
        <option value="">BMW</option>
        <option value="">Mercedes</option>
        <option value="">Honda</option>
    </select>
    <br>
    <label for="file">Upload pdf file</label>
    <input type="file" name="file" id="file">
    <br>
    <label for="complaint">Complaint</label>
    <br>
    <textarea name="complaint" id="complaint" rows="5" cols="50"></textarea>
    <br>
   
    <input type="reset" name="reset" id="reset">
    <br>
    
    <input type="submit" name="submit" id="submit">

    </form>

</body>
</html>
