<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            background-color: orange;
            height: 35px;
            width: 95px;
        }
        button:hover{
            transform: translatey(-5px);
            background-color: red;
        }
        img{
            width: 50%;
          
        }
         img:hover{
            transform: scale(0.9);
         }
         nav{
            display: flex;
            justify-content: space-between;
         }
         nav a{
            text-decoration: none;
            color: black;
            font-weight: bold;
            border-bottom: 2px solid transparent;
            transition: border-color,0.1s;
            transform: translatey(1.2);

         }
         a:hover{
            border-bottom-color:rgb(73, 78, 62) ;
            
         }
    </style>
</head>
<body>
    <button>Hover Me</button>
    <img src="https://img.freepik.com/free-photo/delicious-burger-studio_23-2151846495.jpg?semt=ais_hybrid&w=740&q=80" alt="">
    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>
</body>
</html>
