<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <h2>HTML TABLE</h2>
    <table>
        <caption>Employee Details</caption>
        <thead>
            <tr>
                <th colspan="2">Name</th>
                <th colspan="2">Emp Id</th>
                <th colspan="2">Role</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2" >Tooba</td>
                <td rowspan="2">1</td>
                <td rowspan="2">Programmer</td>
            </tr>
            <tr>
                <td rowspan="2" >Usama</td>
                <td rowspan="2">2</td>
                <td rowspan="2">Doctor</td>
            </tr>
            <tr>
                <td rowspan="2">Aiman</td>
                <td rowspan="2">3</td>
                <td rowspan="2">AI Engineer</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
