<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property</title>
    <style>
        *{
            margin: 0;
            padding: 0
            ;
        }
        .box{
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }
        .box1{
            background-color: aqua;
            /* position: absolute; yeh apny parent k hisab sai set hota hai but it must be noted that agar parent poistioned na hoo tu oper html k hisab sai set hota hai */
            /* top: 0px; */
            /* left: 3px; */
            /* position: sticky; ess sai element pehly normal hoty hai likin scroll krny sai yeh chipak jata hai e.g monga nav bar dapra da use kawo  */
            top: 0px;
            height: 100px;
            width:100vw;
            

        } 
        .box2{
            background-color: azure;
            /* position: relative; apni jaga sai halka sa move kiya jasakta hai */
            /* top: 34px; */
            /* left: 56px; */
        }    
        .box3{
            background-color: antiquewhite;
            /* position: fixed; ess sai elelment viewport k sath chipak jata hai jo scroll krny sai bhi move nahi krta;
            bottom: 0px;
            left: 8vw; */
            height: 111px;
        }
        .box4{
            background-color: purple;
        }
        .parent{
            padding:43px;
            margin:34px;
            border: 3px solid purple;
            /* position: absolute; */

            /* Important note */
            /* Exception: Transform,filter or perspective properties can also make an element appear as positioned */
            /* transform: translate(0);
            filter: invert(0);
            perspective:0cm ; */
        }

        
      
 
    </style>
</head>

<body>
    <div class="parent">

   
       <div class=" box box1">Hey my name is Tooba </div>
       <marquee behavior="slide" direction="left">scrolling left </marquee>
       <div class="box box2"></div>
      <div class="box box3"></div>
      <div class="box box4"></div>
    </div>
</body>
</html>
