<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glowing Rings</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    overflow: hidden;
}

/* container */
.container{
    position: relative;
    width: 80vmin;
    height: 80vmin;
}

/* circles */
.circle{
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: calc(var(--i) * 3vmin);
    aspect-ratio: 1;
    border-radius: 50%;
    border: 3px solid rgb(61,180,40);
    box-shadow: 
        0 0 10px rgb(61,180,40),
        0 0 30px rgb(61,180,40);
    animation: rotate 10s linear infinite;
    animation-delay: calc(var(--i) * 0.15s);
}

/* animation */
@keyframes rotate{
    0%{
        transform: translate(-50%, -50%) rotate(0deg);
    }
    100%{
        transform: translate(-50%, -50%) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="circle" style="--i:1;"></div>
    <div class="circle" style="--i:2;"></div>
    <div class="circle" style="--i:3;"></div>
    <div class="circle" style="--i:4;"></div>
    <div class="circle" style="--i:5;"></div>
    <div class="circle" style="--i:6;"></div>
    <div class="circle" style="--i:7;"></div>
    <div class="circle" style="--i:8;"></div>
    <div class="circle" style="--i:9;"></div>
    <div class="circle" style="--i:10;"></div>
</div>

</body>
</html>
