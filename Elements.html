<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element</title>
</head>
<body>
    <!-- Block Elements: It start from a new line and takeup the full width available(by default) -->
     <!-- Examples -->
      <div>This is a block element</div>
      <p>This is a paragraph</p>
      <h6> Heading</h6>
      <ul>
        <li>list item</li>
      </ul>
      <!-- Inline Element:Do not start from new line and stay with the same line and only take the space required -->
       <!-- Examples -->
        <span>This is inline</span>
        <a href="#">link</a>
        <strong>Bold</strong>
        <em>italic</em>
        <img src="" alt="">
</body>

</html>
