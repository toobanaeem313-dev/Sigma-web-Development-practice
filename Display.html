<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
</head>
<style>
    .box{
        border: 2px solid blue;
        display:inline; /* It is inline property which convert block element to inline element */
        padding: 45px;  /* padding,width,inline element ta sahi na apply kigy nu we will use display inline-block */
        display: inline-block;
        /* display: none; sab kuch space bhi ess waja sai ghayab  hojaye ga */
        /* visibility: hidden; da ba agha saman gayab ki kho space ba ye  */
        display: flex;  justify-content: center;
    /* The above two are used to center something */
    /* display: inline-flex; Tol ba bya pa yeo line ki rashy */
    }
  
    
</style>
<body>
   <div class="box">I am a box
   </div>
   <div class="box">also a nice box</div>
    <span>I am a Good</span>
    <span>Girl</span>
</body>
</html>
