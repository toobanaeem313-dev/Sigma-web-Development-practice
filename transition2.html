<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: aqua;
            width: 100vw;
            height: 100vh;
            border: 2px solid blue;
        }
        .Box{
            padding: 120px;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            transition: all 3s 
cubic-bezier(0.3, 0.29, 0.16, 0.76) 1s;

        }
        
        .Box:hover{
            transform: rotate3d(1,1,1,360deg);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="Box"><img src="pic.jpg" alt="" width="200"></div>
    </div>

</body>
</html>
