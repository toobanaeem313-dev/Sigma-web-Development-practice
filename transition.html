<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transition in CSS</title>
    <style>
        .container{
            background-color:burlywood;
            width: 50vw;
            height: 40vh;
        }
          .box{
            background-color:aqua;
              width: 10vw;
            height: 4vh;
            transition-property: background-color;
            transition-duration: 3s;
            transition-timing-function:cubic-bezier(0.3, 0.16, 0.46, 0.85);
            transition-delay:1s ;
            
        }
        .box:hover{
            /* transform:  translate3d(200px); */
            transform: rotate3d(0,0,1,40deg);
            transform: skew(30deg);
            background-color: red;

        }
    </style>
</head>
<body>
    <!-- Transition ka mtlb hai aik state sai dosry state smoothly jana -->
     <div class="container">
        <div class="box"></div>
     </div>
</body>
</html>
