<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector</title>
</head>
<style>
    body{
        background-color: cadetblue;
    }
</style>
<body>
    <!-- Element selector -->
    <style>
        p{
            color: red;
            font-style: italic;
        }
    </style>
    <p>This is a paragraph</p>
    <!-- Class selector -->
     <style>
        .Box{
            background-color: lightseagreen;

        }
     </style>
     <div class="Box">This is a box</div>
     <!-- ID selector -->
      <style>
        #main{
            color: brown;
            flex: 0cqmax;
        }
      </style>
      <div id="main">This is ID selector</div>
      <!-- Group selector -->
       <style>
        h1,h2,p{
            color: darkgreen;
        }
        /* Universal selector */
        *{
            color: black;
            background-color: brown;
        }
       </style>
       <h1>Heading 1</h1>
       <h2>Heading 2</h2>
       <p>paragraph</p>
      <div style="color: chartreuse;">Hey my name is Tooba</div>
</body>
</html>
