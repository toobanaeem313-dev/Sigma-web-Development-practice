<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>challange</title>
    <style>
        .container{
            background-color: blue;
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;


        }
        .ball{
          background-color: red;
         width: 100px;
          height: 100px;
          border-radius: 50%;
          position: absolute;
          top: 450px;
          left: 0;
         animation: animateX 3s linear infinite,
             animateY 1s ease-out infinite alternate;

        }
       @keyframes animateX{
         from{
            left: 0;
        }
            to{
                left:100%;
            }
         }
         @keyframes animateY{
            from{
            top: 0;
            }
            to{
                top: 100%;
            }
         }
       
      
    </style>
</head>
<body>
    <div class="container">
        <div class="ball"></div>
</body>
</html>
