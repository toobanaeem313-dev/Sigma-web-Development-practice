<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <style>
        .box{
            width: 150px;
            height: 100px;
            background-color:blueviolet;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: rotatebox,movebox;
            animation-duration: 5s;
            animation-timing-function:cubic-bezier(0.165, 0.84, 0.44, 2);
            animation-delay: 1s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
            
            
        
        }
        body{
            background-color: rgba(161, 42, 165, 0.336);
            display: flex;
            justify-content: center;
            align-items:center;
            position: relative;
            top: 150px;
        }
        @keyframes rotatebox{
            0%{transform: rotate(90deg) translateX(100px) translateY(100px) translateZ(100px) skew(90deg);}
            50%{transform: rotate(180deg);}
            100%{transform: rotate(360deg);}
        }
        @keyframes movebox{
            from{
                transform: translate3d(600px);
            }
            to{
                background-color: rgba(189, 34, 155, 0.507);
            }
        }
    </style>
</head>
<body>
    <div class="box">Hey I am a Box</div>
</body>
</html>
