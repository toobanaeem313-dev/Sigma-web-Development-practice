<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byte & Bite Shop</title>

  <style>
    body{
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* GRID CONTAINER */
    .menu{
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 80px 1fr 60px;
      grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
      min-height: 100vh;
    }

    /* HEADER */
    .header{
      grid-area: header;
      background: #e85d04;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .header a{
      color: white;
      text-decoration: none;
      margin-left: 15px;
    }

    /* SIDEBAR */
    .sidebar{
      grid-area: sidebar;
      background: #f48c06;
      padding: 20px;
    }

    .sidebar a{
      display: block;
      color: white;
      text-decoration: none;
      margin-bottom: 15px;
    }

    /* MAIN CONTENT */
    .main{
      grid-area: main;
      padding: 30px;
    }

    .cards{
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 20px;
    }

    .card{
      background: #f1f1f1;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover{
      transform: scale(1.05);
    }

    .card img{
      width: 90%;
      height: auto;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .card h3{
      margin: 5px 0;
    }

    .card p{
      margin: 0;
      font-weight: bold;
      color: #333;
    }

    /* FOOTER */
    .footer{
      grid-area: footer;
      background: #212529;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

  </style>
</head>

<body>

  <div class="menu">

    <header class="header">
      <h2>BYTE & BITE</h2>
      <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <aside class="sidebar">
      <a href="#">Popular Products</a>
      <a href="#">Deals</a>
      <a href="#">Categories</a>
      <a href="#">Cart</a>
    </aside>

    <main class="main">
      <h1>Welcome to Byte & Bite Restaurant </h1>
      <p>Discover our products & special offers</p>

      <div class="cards">
        <div class="card">
          <img src="https://img.freepik.com/free-photo/delicious-burger-studio_23-2151846495.jpg?semt=ais_hybrid&w=740&q=80" alt="Burger">
          <h3>Burger</h3>
          <p>$8.99</p>
        </div>
        <div class="card">
          <img src="https://via.placeholder.com/150" alt="Pizza">
          <h3>Pizza</h3>
          <p>$12.99</p>
        </div>
        <div class="card">
          <img src="https://via.placeholder.com/150" alt="Salad">
          <h3>Salad</h3>
          <p>$6.99</p>
        </div>
        <div class="card">
          <img src="https://via.placeholder.com/150" alt="Sushi">
          <h3>Sushi</h3>
          <p>$14.99</p>
        </div>
        <div class="card">
          <img src="https://via.placeholder.com/150" alt="Cake">
          <h3>Cake</h3>
          <p>$5.99</p>
        </div>
        <div class="card">
          <img src="https://via.placeholder.com/150" alt="Coffee">
          <h3>Coffee</h3>
          <p>$2.99</p>
        </div>
      </div>
    </main>

    <footer class="footer">
      &copy; 2024 Byte & Bite | All rights reserved
    </footer>

  </div>

</body>
</html>
